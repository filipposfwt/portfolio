<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ "/" | relLangURL }}">
      {{ with resources.Get "images/logo.jpg" }}
        {{ $logo := .Resize "104x webp q90" }}
        <img class="brand-logo" src="{{ $logo.RelPermalink }}" alt="obal logo"
             width="52" height="{{ math.Round (mul 52 (div (float $logo.Height) $logo.Width)) }}">
      {{ end }}
      <span>{{ .Site.Params.author }}</span>
    </a>

    <div class="header-tools">
      <button class="theme-toggle" type="button" aria-label="Toggle dark mode">
        <span class="theme-toggle__icon" aria-hidden="true">◐</span>
      </button>
      <button class="menu-toggle" type="button" aria-label="Open menu"
              aria-expanded="false" aria-controls="site-menu">
        <span class="menu-toggle__bars" aria-hidden="true"></span>
      </button>
    </div>
  </div>
</header>

<nav id="site-menu" class="menu-overlay" aria-hidden="true">
  <ul class="menu-overlay__main">
    {{ range .Site.Menus.main }}
      <li><a href="{{ .PageRef | relLangURL }}">{{ .Name }}</a></li>
    {{ end }}
  </ul>
  {{ with .Site.Menus.secondary }}
    <ul class="menu-overlay__secondary">
      {{ range . }}
        <li><a href="{{ .PageRef | relLangURL }}">{{ .Name }}</a></li>
      {{ end }}
    </ul>
  {{ end }}
</nav>
