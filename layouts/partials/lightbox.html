<div class="lightbox" id="lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Slideshow">
  <button class="lightbox__close" type="button" aria-label="Close slideshow">✕</button>
  <button class="lightbox__nav lightbox__nav--prev" type="button" aria-label="Previous photo">‹</button>
  <figure class="lightbox__stage">
    <div class="lightbox__frame">
      <img class="lightbox__img" src="" alt="">
    </div>
    <figcaption class="lightbox__caption">
      <span class="lightbox__title"></span>
      <span class="lightbox__counter"></span>
    </figcaption>
  </figure>
  <button class="lightbox__nav lightbox__nav--next" type="button" aria-label="Next photo">›</button>
</div>
