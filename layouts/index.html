{{ define "main" }}
  <section class="splash">
    {{ with resources.Get "images/logo.jpg" }}
      {{ $l := .Resize "760x webp q95" }}
      <img class="splash__logo" src="{{ $l.RelPermalink }}" alt="obal"
           width="{{ $l.Width }}" height="{{ $l.Height }}" loading="eager">
    {{ end }}
    <div class="splash__intro">
      {{ .Content }}
    </div>
  </section>
{{ end }}
