# --- Site basics ---------------------------------------------------------
# NOTE: baseURL uses the GitHub Pages project-site path for now.
# When you move to a custom domain, change this to "https://yourdomain.com/"
# and put the domain in static/CNAME. Nothing else needs to change.
baseURL = "https://filipposfwt.github.io/portfolio/"
locale = "en-us"
title = "obal"

# Pretty URLs and good defaults
enableRobotsTXT = true
summaryLength = 20

# --- Params (available in templates as .Site.Params) ---------------------
[params]
  # Displayed name / brand. Artist name out front; real name lives in About.
  author = "obal"
  realName = "Vangelis Balis"
  role = "Graphic artist — prints, apparel & ceramics"
  description = "obal (Vangelis Balis) — graphic artist making prints, t-shirts and ceramics, ruled by satyrs."
  location = "Athens, Greece"
  email = ""   # add a contact email to show it in the footer & contact page

  # Social links (leave blank to hide).
  [params.social]
    instagram = "obal___"
    behance = ""
    dribbble = ""
    linkedin = ""

# --- Navigation ----------------------------------------------------------
# Primary links (big, in the hamburger overlay)
[menus]
  [[menus.main]]
    name = "Ceramics"
    pageRef = "/ceramics"
    weight = 10
  [[menus.main]]
    name = "Illustrations"
    pageRef = "/illustrations"
    weight = 20
  [[menus.main]]
    name = "Mixed Media"
    pageRef = "/mixed-media"
    weight = 30

  # Secondary links (smaller, under the main items in the overlay)
  [[menus.secondary]]
    name = "Instagram"
    url = "https://www.instagram.com/obal___/"
    weight = 10
  [[menus.secondary]]
    name = "LinkedIn"
    url = "https://www.linkedin.com/in/evangelos-balis-974282324/"
    weight = 20

# --- Markup / rendering --------------------------------------------------
[markup]
  [markup.goldmark.renderer]
    unsafe = true          # allow raw HTML in markdown when needed
  [markup.highlight]
    noClasses = false

# --- Image processing ----------------------------------------------------
[imaging]
  quality = 82
  resampleFilter = "Lanczos"
